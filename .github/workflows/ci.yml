name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cuerporaiz_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cuerporaiz_ci
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cuerporaiz_ci
      AUTH_SECRET: ci-only-test-secret-not-for-production-use-1234567890
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_CENTER_SLUG: e2e-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # En CI usamos db push (no migrate deploy) porque el historial de migraciones
      # tiene una baseline (20260317133157_baseline) que duplica CREATE TYPE/TABLE
      # de las migraciones previas, lo que rompe en una DB fresca con error 42710.
      # El schema queda igual; el test de migraciones reales se hace al deployar a Supabase.
      - name: Push schema to test database
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run e2e
